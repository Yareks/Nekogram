name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'

jobs:
  build:
    name: Build Debug APK (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-ndk-arm64-${{ github.sha }}
          restore-keys: |
            ccache-ndk-arm64-

      - name: Configure ccache
        run: |
          ccache --max-size=10G
          ccache --set-config=compiler_check="%compiler% -dumpmachine; %compiler% -dumpversion"
          ccache --set-config=hash_dir=false
          ccache --set-config=hard_link=true
          ccache -z

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle properties
        run: |
          mkdir -p ~/.gradle
          printf 'org.gradle.caching=true\norg.gradle.parallel=true\norg.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC\nandroid.native.buildOutput=verbose\n' >> ~/.gradle/gradle.properties

      - name: Configure local.properties
        run: |
          echo "apiId=${{ secrets.API_ID }}" >> local.properties
          echo "apiHash=${{ secrets.API_HASH }}" >> local.properties
          echo "helperBotId=0" >> local.properties
          echo "helperBotUsername=null" >> local.properties
          echo "sentryDsn=" >> local.properties
          echo "mapsApiKey=" >> local.properties

      - name: Place google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json

      - name: Place sentry.properties
        run: |
          echo "${{ secrets.SENTRY_PROPERTIES }}" | base64 --decode > sentry.properties

      - name: Set up ccache symlinks for NDK
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf $(which ccache) "$HOME/.local/bin/gcc"
          ln -sf $(which ccache) "$HOME/.local/bin/g++"
          ln -sf $(which ccache) "$HOME/.local/bin/clang"
          ln -sf $(which ccache) "$HOME/.local/bin/clang++"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Patch build.gradle — arm64-v8a only
        run: |
          # Вставляем abiFilters в defaultConfig TMessagesProj_App
          sed -i '/splits\.abi {/,/}/{ /include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/d; /universalApk true/d; }' TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a"/g' TMessagesProj_App/build.gradle || true
          # Добавляем abiFilters в TMessagesProj defaultConfig
          sed -i '/vectorDrawables {/i\        ndk { abiFilters "arm64-v8a" }' TMessagesProj/build.gradle || true
          echo "=== TMessagesProj_App/build.gradle splits section ==="
          grep -A10 "splits" TMessagesProj_App/build.gradle || true

      - name: Build arm64-v8a Debug APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724
          ./gradlew :TMessagesProj_App:assembleDebug \
            -Pandroid.injected.build.abi=arm64-v8a \
            --no-daemon \
            --stacktrace

      - name: Show ccache stats
        if: always()
        run: ccache -s

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-ndk-arm64-${{ github.sha }}

      - name: Find APK
        run: find . -name "*.apk" | head -20

      - name: Upload Debug APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-debug-arm64-v8a
          path: TMessagesProj_App/build/outputs/apk/debug/*arm64*.apk
          retention-days: 30
          if-no-files-found: warn
