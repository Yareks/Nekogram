name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'

jobs:
  build:
    name: Build Debug APK (arm64-v8a)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Maximize disk and memory
        run: |
          # Показываем текущее состояние
          free -h
          df -h
          # Добавляем swap если нет достаточного
          SWAP_TOTAL=$(free -m | awk '/^Swap:/ {print $2}')
          if [ "$SWAP_TOTAL" -lt 4096 ]; then
            sudo dd if=/dev/zero of=/swap bs=1M count=8192 status=progress
            sudo chmod 600 /swap
            sudo mkswap /swap
            sudo swapon /swap
          fi
          free -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-ndk-arm64-${{ github.sha }}
          restore-keys: |
            ccache-ndk-arm64-

      - name: Configure ccache
        run: |
          ccache --max-size=10G
          ccache --set-config=compiler_check="%compiler% -dumpmachine; %compiler% -dumpversion"
          ccache --set-config=hash_dir=false
          ccache --set-config=hard_link=true
          ccache -z

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC
          android.native.buildOutput=verbose
          EOF

      - name: Configure local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          apiId=${{ secrets.API_ID }}
          apiHash=${{ secrets.API_HASH }}
          helperBotId=0
          helperBotUsername=null
          sentryDsn=
          mapsApiKey=
          EOF

      - name: Place google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json
          python3 -c "import json; d=json.load(open('TMessagesProj_App/google-services.json')); [print('pkg:', c['client_info']['android_client_info']['package_name']) for c in d['client']]"

      - name: Place sentry.properties
        run: |
          echo "${{ secrets.SENTRY_PROPERTIES }}" | base64 --decode > sentry.properties

      - name: Set up ccache symlinks for NDK
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf $(which ccache) "$HOME/.local/bin/clang"
          ln -sf $(which ccache) "$HOME/.local/bin/clang++"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build arm64-v8a Debug APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
        run: |
          ./gradlew :TMessagesProj_App:assembleDebug \
            -Pandroid.injected.build.abi=arm64-v8a \
            --no-daemon

      - name: Show ccache stats
        if: always()
        run: ccache -s

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-ndk-arm64-${{ github.sha }}

      - name: List APK output
        run: |
          find TMessagesProj_App/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-debug-arm64-v8a
          path: TMessagesProj_App/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
